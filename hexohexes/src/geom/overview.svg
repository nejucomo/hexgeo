<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <style>
    text {
      font-family: system-ui, sans-serif;
      fill: currentColor;
    }
    .axis {
      stroke: currentColor;
      stroke-width: 0.0125;
      marker-end: url(#arrow);
    }
    .gridLine {
      stroke: currentColor;
      stroke-width: 0.005;
      stroke-dasharray: .01 .03;
    }
    .circle {
      stroke: currentColor;
      stroke-width: 0.01;
      fill: none;
    }
    .hex {
      stroke: #0a66cc;
      stroke-width: 0.025;
      fill: rgba(10, 102, 204, 0.10);
    }
    .label {
      font-size: 22px;
      font-weight: 600;
    }
    .small {
      font-size: 16px;
    }
  </style>
  <defs>
    <marker
        id="arrow"
        viewBox="-5 -3 5.5 6"
        markerWidth="5.5"
        markerHeight="6"
        orient="auto"
        stroke-width="2" stroke="currentColor"
      >
      <line x1="0.5" y1="+0.5" x2="-5" y2="-5"/>
      <line x1="0.5" y1="-0.5" x2="-5" y2="+5"/>
    </marker>
    <g id="axes-and-circle" >
      <g class="axis">
        <line x1="-1.2" y1="0" x2="1.2" y2="0" />
        <line x1="0" y1="-1.2" x2="0" y2="1.2" />
        <g fill="currentColor">
          <circle cx="+0" cy="+0" r="0.025" />
          <circle cx="-1" cy="-0" r="0.025" />
          <circle cx="+1" cy="+0" r="0.025" />
          <circle cx="-0" cy="-1" r="0.025" />
          <circle cx="+0" cy="+1" r="0.025" />
        </g>
      </g>
      <g class="gridLine">
        <line x1="-1.2" y1="-1" x2="1.2" y2="-1" />
        <line x1="-1.2" y1="+1" x2="1.2" y2="+1" />
        <line x1="-1" y1="-1.2" x2="-1" y2="1.2" />
        <line x1="+1" y1="-1.2" x2="+1" y2="1.2" />
      </g>
      <circle class="circle" cx="0" cy="0" r="1"/>
    </g>
    <g id="axis-labels" class="small" >
      <text class="label" x="155" y="6">
        x
      </text>
      <text class="label" x="-6" y="168">
        y
      </text>
      <text x="-172" y="-16">
        (-1, 0)
      </text>
      <text x="128" y="-16">
        (1, 0)
      </text>
      <text x="10" y="-130">
        (0, -1)
      </text>
      <text x="10" y="142">
        (0, 1)
      </text>
    </g>
  </defs>
  <g id="PointyTop" transform="translate(225 210)">
    <text class="label" x="0" y="-155" text-anchor="middle">PointyTop</text>
    <use href="#axis-labels" />
    <g transform="scale(120)">
      <use href="#axes-and-circle" />
      <polygon class="hex"
        points="
          0,-1
          0.8660254,-0.5
          0.8660254,0.5
          0,1
          -0.8660254,0.5
          -0.8660254,-0.5
        "/>
    </g>
  </g>
  <g id="FlatTop" transform="translate(675 210)">
    <text class="label" x="0" y="-155" text-anchor="middle">FlatTop</text>
    <use href="#axis-labels" />
    <g transform="scale(120)">
      <use href="#axes-and-circle" />
      <polygon class="hex"
        points="
          -1,0
          -0.5,-0.8660254
          0.5,-0.8660254
          1,0
          0.5,0.8660254
          -0.5,0.8660254
        "/>
    </g>
  </g>
</svg>
