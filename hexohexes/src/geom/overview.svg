<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <style>
    text {
      font-family: system-ui, sans-serif;
      fill: black;
    }
    .axis, .tick {
      stroke: black;
      stroke-width: 0.0125;
    }
    .circle {
      stroke: #666;
      stroke-width: 0.0166667;
      fill: none;
    }
    .hex {
      stroke: #0a66cc;
      stroke-width: 0.025;
      fill: rgba(10, 102, 204, 0.10);
    }
    .label {
      font-size: 22px;
      font-weight: 600;
    }
    .small {
      font-size: 16px;
    }
  </style>
  <rect width="900" height="420" stroke="green" fill="none" />
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="0.0583333" markerHeight="0.0583333"
            orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="black"/>
    </marker>
  </defs>
  <!-- LEFT: PointyTop -->
  <g transform="translate(225 210)">
    <text class="label" x="0" y="-155" text-anchor="middle">PointyTop</text>
    <!-- logical coordinates inside this group: 1 unit = 120 SVG units -->
    <g transform="scale(120)">
      <line class="axis" x1="-1.2083333" y1="0" x2="1.2083333" y2="0" marker-end="url(#arrow)"/>
      <line class="axis" x1="0" y1="-1.2083333" x2="0" y2="1.2083333" marker-end="url(#arrow)"/>
      <circle class="circle" cx="0" cy="0" r="1"/>
      <polygon class="hex"
        points="
          0,-1
          0.8660254,-0.5
          0.8660254,0.5
          0,1
          -0.8660254,0.5
          -0.8660254,-0.5
        "/>
      <circle cx="0" cy="0" r="0.025" fill="black"/>
    </g>
    <!-- text left in outer screen-space coords so font size stays unchanged -->
    <text class="small" x="150" y="-8">x</text>
    <text class="small" x="8" y="158">y</text>
    <text class="small" x="6" y="-124">(0, -1)</text>
    <text class="small" x="6" y="136">(0, 1)</text>
    <text class="small" x="126" y="18">1</text>
  </g>
  <!-- RIGHT: Flat Top -->
  <g transform="translate(675 210)">
    <text class="label" x="0" y="-155" text-anchor="middle">Flat Top</text>
    <!-- logical coordinates inside this group: 1 unit = 120 SVG units -->
    <g transform="scale(120)">
      <line class="axis" x1="-1.2083333" y1="0" x2="1.2083333" y2="0" marker-end="url(#arrow)"/>
      <line class="axis" x1="0" y1="-1.2083333" x2="0" y2="1.2083333" marker-end="url(#arrow)"/>
      <circle class="circle" cx="0" cy="0" r="1"/>
      <polygon class="hex"
        points="
          -1,0
          -0.5,-0.8660254
          0.5,-0.8660254
          1,0
          0.5,0.8660254
          -0.5,0.8660254
        "/>
      <circle cx="0" cy="0" r="0.025" fill="black"/>
    </g>
    <!-- text left in outer screen-space coords so font size stays unchanged -->
    <text class="small" x="150" y="-8">x</text>
    <text class="small" x="8" y="158">y</text>
    <text class="small" x="-162" y="-8">(-1, 0)</text>
    <text class="small" x="88" y="-8">(1, 0)</text>
    <text class="small" x="126" y="18">1</text>
  </g>
</svg>
