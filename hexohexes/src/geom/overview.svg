<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <style>
    text {
      font-family: system-ui, sans-serif;
      fill: currentColor;
    }
    .axis, .tick {
      stroke: currentColor;
      stroke-width: 0.0125;
    }
    .circle {
      stroke: currentColor;
      stroke-width: 0.01;
      stroke-dasharray: .01 .02;
      fill: none;
    }
    .hex {
      stroke: #0a66cc;
      stroke-width: 0.025;
      fill: rgba(10, 102, 204, 0.10);
    }
    .label {
      font-size: 22px;
      font-weight: 600;
    }
    .small {
      font-size: 16px;
    }
  </style>
  <defs>
    <marker
        id="arrow"
        viewBox="-5 -3 5.5 6"
        markerWidth="5.5"
        markerHeight="6"
        orient="auto"
      >
      <line x1="0.5" y1="+0.5" x2="-5" y2="-5" stroke-width="2" stroke="currentColor" />
      <line x1="0.5" y1="-0.5" x2="-5" y2="+5" stroke-width="2" stroke="currentColor" />
    </marker>
    <g id="axes-and-circle" >
      <line class="axis" x1="-1.2083333" y1="0" x2="1.2083333" y2="0" marker-end="url(#arrow)"/>
      <line class="axis" x1="0" y1="-1.2083333" x2="0" y2="1.2083333" marker-end="url(#arrow)"/>
      <circle class="circle" cx="0" cy="0" r="1"/>
      <circle cx="0" cy="0" r="0.025" class="axis" fill="currentColor" />
    </g>
    <g id="axis-labels" class="small" >
      <text class="label" x="155" y="6">x</text>
      <text class="label" x="-6" y="168">y</text>
      <text x="-172" y="-12">(-1, 0)</text>
      <text x="128" y="-12">(1, 0)</text>
      <text x="6" y="-130">(0, -1)</text>
      <text x="6" y="142">(0, 1)</text>
      <!-- <text class="small" x="126" y="18">1</text> -->
    </g>
  </defs>
  <g id="PointyTop" transform="translate(225 210)">
    <text class="label" x="0" y="-155" text-anchor="middle">PointyTop</text>
    <use href="#axis-labels" />
    <g transform="scale(120)">
      <use href="#axes-and-circle" />
      <polygon class="hex"
        points="
          0,-1
          0.8660254,-0.5
          0.8660254,0.5
          0,1
          -0.8660254,0.5
          -0.8660254,-0.5
        "/>
    </g>
    <!-- text left in outer screen-space coords so font size stays unchanged -->
  </g>
  <g id="FlatTop" transform="translate(675 210)">
    <text class="label" x="0" y="-155" text-anchor="middle">Flat Top</text>
    <use href="#axis-labels" />
    <g transform="scale(120)">
      <use href="#axes-and-circle" />
      <polygon class="hex"
        points="
          -1,0
          -0.5,-0.8660254
          0.5,-0.8660254
          1,0
          0.5,0.8660254
          -0.5,0.8660254
        "/>
    </g>
  </g>
</svg>
